name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.5)'
        required: false

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python for native modules
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit --legacy-peer-deps
        timeout-minutes: 20
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3 keytar --build-from-source

      - name: Build and sign macOS app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Supabase configuration (required for user data)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # API configuration (required for authenticated endpoints)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          # PostHog analytics
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: 'https://us.i.posthog.com'
          # Enable Pull-Based Execution (v4 iterative engine)
          VITE_ENABLE_PULL_EXECUTION: 'true'
        run: npm run build && npx electron-builder --mac --publish never
        timeout-minutes: 30

      - name: Verify macOS updater metadata
        run: node scripts/verify-release-artifacts.mjs release/latest-mac.yml

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python for native modules
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --no-audit --legacy-peer-deps
        timeout-minutes: 20
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build Windows app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Supabase configuration (required for user data)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # API configuration (required for authenticated endpoints)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          # PostHog analytics
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: 'https://us.i.posthog.com'
          # Enable Pull-Based Execution (v4 iterative engine)
          VITE_ENABLE_PULL_EXECUTION: 'true'
        run: npm run build && npx electron-builder --win --publish never
        timeout-minutes: 30

      - name: Verify Windows updater metadata
        run: node scripts/verify-release-artifacts.mjs release/latest.yml

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-release
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest.yml

  publish-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-release
          path: artifacts/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-release
          path: artifacts/windows

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "$REQUESTED_VERSION" ]]; then
            tag="v${REQUESTED_VERSION#v}"
          else
            echo "A version is required for manually dispatched releases." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish complete release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          mapfile -t files < <(find artifacts -type f -print)
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
